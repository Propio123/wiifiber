
<!DOCTYPE html>

<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>WiiFiber Test</title>
    
    <style type="text/css">
        
        body { font-family: sans-serif; text-align: center; background: #f4f4f4; padding: 20px; }
        h1 { color: #333; }
        #testWrapper { margin-top: 20px; }
        .hidden { display: none; }
        .visible { display: block; }
        #startStopBtn { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>

<body>
    <h1>WiiFiber Test de Velocidad</h1>
    
    <div id="loading" class="visible">
        <p id="message">Cargando motor de prueba...</p>
    </div>

    <div id="testWrapper" class="hidden">
        <button id="startStopBtn" onclick="startStop()">Iniciar Prueba</button>
        <div id="test">
            <p>Ping: <span id="pingText">--</span> ms</p>
            <p>Download: <span id="dlText">--</span> Mbps</p>
            <p>Upload: <span id="ulText">--</span> Mbps</p>
        </div>
    </div>

   <script type="text/javascript" src="speedtest.js"></script>
<script type="text/javascript">
    // Configuramos el servidor directamente en la instancia
 var s = new Speedtest({
    server: "https://speedtest.librespeed.org/", // Servidor estable
    // Forzamos el uso de una sola ruta directa
    forceIE11Workaround: true
});

s.onend = function(aborted) {
    console.log("Prueba finalizada/abortada");
    
    // FORZAR limpieza de cualquier intervalo remanente
    if (typeof interval !== 'undefined') clearInterval(interval);
    
    // Resetear el botón
    document.getElementById('startStopBtn').disabled = false;
    document.getElementById('startStopBtn').innerText = "Reiniciar Prueba";
};

// Modifica tu 'onupdate' para capturar valores extremos
s.onupdate = function(data) {
    // Si la velocidad es una locura, ignoramos el valor
    const dl = parseFloat(data.dlStatus) > 10000 ? "0.00" : data.dlStatus;
    const ul = parseFloat(data.ulStatus) > 10000 ? "0.00" : data.ulStatus;
    
    document.getElementById('pingText').textContent = data.pingStatus;
    document.getElementById('dlText').textContent = dl;
    document.getElementById('ulText').textContent = ul;
};

    // Esta función se ejecuta apenas carga el script
    window.onload = function() {
        console.log("Motor inicializado con servidor directo.");
        document.getElementById('loading').className = 'hidden';
        document.getElementById('testWrapper').className = 'visible';
    };

    function startStop() {
    var btn = document.getElementById('startStopBtn');
    
    // Si el motor ya está corriendo (testState > 0), no hacer nada o abortar
    if (s.getState() > 0) {
        console.warn("La prueba ya está en curso.");
        return;
    }

    console.log("Iniciando prueba...");
    btn.disabled = true; // Desactivar botón
    btn.innerText = "Probando...";
    
    s.start();
}
</script>
</body>
</html>
