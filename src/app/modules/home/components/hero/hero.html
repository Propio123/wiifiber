<section class="relative min-h-[80vh] flex items-center pt-20 overflow-hidden bg-black">
  <div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-[#4FC3F7]/10 blur-[120px] rounded-full"></div>
  <div class="absolute bottom-[-10%] left-[-10%] w-[400px] h-[400px] bg-[#1a237e]/20 blur-[100px] rounded-full"></div>

  <div class="container mx-auto px-6 grid md:grid-cols-2 gap-12 items-center relative z-10">
    <div class="space-y-8">
      <div class="inline-block px-4 py-1 rounded-full border border-[#4FC3F7]/30 bg-[#4FC3F7]/5 text-[#4FC3F7] text-sm font-bold tracking-widest uppercase">
        🚀 Promoción por tiempo limitado
      </div>
      <h1 class="text-6xl md:text-8xl font-black leading-none tracking-tighter">
        Ven y forma parte de la <span class="text-[#4FC3F7]">Familia WiiFiber</span>
      </h1>
      <p class="text-xl text-gray-400 max-w-lg">
        Internet de calidad, precios justos. <span class="text-white font-semibold">Instalación SIN COSTO + 1 MES GRATIS</span> por regreso a clases.
      </p>
      <div class="flex flex-wrap gap-4">
        <button (click)="abrirWhatsApp()" 
        class="bg-[#4FC3F7] hover:bg-[#3bb0e2] text-black font-black py-5 px-10 rounded-2xl transition-all transform hover:scale-105 shadow-[0_0_30px_rgba(79,195,247,0.4)]">
  AGENDA TU INSTALACIÓN HOY
</button>
      </div>
    </div>
    
    <div class="relative">
      <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent z-10"></div>
    <img src="assets/publi.jpg" 
     alt="WiiFiber Home" 
     class="w-full h-auto object-cover rounded-3xl shadow-2xl border border-gray-800 transform rotate-2">
    </div>
  </div>
</section>
